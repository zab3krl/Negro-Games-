<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Negro Games Launcher - Pobieranie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #070708;
      --bg-end: #1a1b1f;
      --text: #f4f5f9;
      --muted: #838b98;
      --blue: #3aa0ff;
      --btn: #3f485b;
      --btn-hover: #4b5670;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 72% 52%, rgba(166, 174, 190, 0.1), transparent 36%),
        radial-gradient(circle at 24% 14%, rgba(96, 102, 118, 0.14), transparent 38%),
        linear-gradient(105deg, var(--bg-start) 0%, #0f1013 48%, var(--bg-end) 100%);
    }

    .bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg::before,
    .bg::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(85px);
      opacity: 0.15;
    }

    .bg::before {
      width: 340px;
      height: 340px;
      left: -90px;
      top: -90px;
      background: #2a2d35;
    }

    .bg::after {
      width: 520px;
      height: 520px;
      right: -170px;
      bottom: -190px;
      background: #3b4457;
    }

    .home {
      position: fixed;
      top: 10px;
      left: 14px;
      color: #e9edf5;
      text-decoration: none;
      font-size: 12px;
      z-index: 2;
    }

    .layout {
      position: relative;
      z-index: 1;
      min-height: 100%;
      width: min(980px, 92vw);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 285px;
      align-items: center;
      gap: clamp(2rem, 6vw, 7rem);
    }

    .left h1 {
      margin: 0;
      font-size: clamp(2.1rem, 4.2vw, 3.2rem);
      line-height: 1;
      letter-spacing: 0.01em;
      font-weight: 800;
    }

    .left p {
      margin: 0.9rem 0 1.5rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      background: var(--btn);
      color: #f0f3f9;
      padding: 0.72rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .btn:hover {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.9;
      cursor: not-allowed;
    }

    .status {
      min-height: 1.3rem;
      margin-top: 0.8rem;
      font-size: 0.9rem;
      color: #c9d6ea;
    }

    .right {
      justify-self: end;
    }

    .art {
      width: 280px;
      height: 450px;
      border: 2px solid var(--blue);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 26px rgba(58, 160, 255, 0.42), inset 0 0 22px rgba(74, 142, 241, 0.2);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .art img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
      image-rendering: crisp-edges;
      display: block;
    }

    @media (max-width: 900px) {
      .layout {
        width: min(640px, 92vw);
        grid-template-columns: 1fr;
        text-align: center;
        justify-items: center;
        padding: 5rem 0 3rem;
      }

      .right {
        justify-self: center;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <a href="#" class="home" aria-label="Strona glowna">⌂</a>

  <main class="layout">
    <section class="left">
      <h1>ZAINSTALUJ NOWY<br>NEGRO GAMES LAUNCHER</h1>
      <p>WSZYSTKIE GRY W JEDNYM MIEJSCU</p>
      <button id="downloadBtn" class="btn" type="button">pobierz na Windows</button>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>

    <section class="right" aria-hidden="true">
      <div class="art">
        <img src="negro.png" alt="Negro Games Logo">
      </div>
    </section>
  </main>

  <script>
    const downloadBtn = document.getElementById("downloadBtn");
    const statusLine = document.getElementById("status");

    const launcherCandidates = [
      "NegroGamesLauncher.exe",
      "dist/NegroGamesLauncher.exe",
      "downloads/NegroGamesLauncherSetup.exe"
    ];
    let cooldown = 0;
    let timerId = null;

    function setButton() {
      if (cooldown > 0) {
        downloadBtn.textContent = `Pobieranie za ${cooldown}s`;
        downloadBtn.disabled = true;
      } else {
        downloadBtn.textContent = "pobierz na Windows";
        downloadBtn.disabled = false;
      }
    }

    async function resolveLauncherUrl() {
      for (const candidate of launcherCandidates) {
        try {
          const response = await fetch(candidate, { method: "HEAD", cache: "no-store" });
          if (response.ok) {
            return candidate;
          }
        } catch (error) {
          // Continue trying next candidate path.
        }
      }

      return null;
    }

    async function runDownload() {
      const launcherUrl = await resolveLauncherUrl();
      if (!launcherUrl) {
        statusLine.textContent = "Nie znaleziono pliku launchera (.exe). Sprawdz czy plik jest obok index.html albo w folderze dist.";
        return;
      }

      const a = document.createElement("a");
      a.href = launcherUrl;
      a.download = launcherUrl.includes("Setup") ? "NegroGamesLauncherSetup.exe" : "NegroGamesLauncher.exe";
      document.body.appendChild(a);
      a.click();
      a.remove();

      statusLine.textContent = "Pobieranie wystartowalo. Jesli plik jest niepoprawny, odswiez strone Ctrl+F5.";
    }

    downloadBtn.addEventListener("click", function () {
      if (cooldown > 0) {
        return;
      }

      statusLine.textContent = "Przygotowuje paczke instalacyjna...";
      cooldown = 3;
      setButton();

      timerId = window.setInterval(function () {
        cooldown -= 1;
        setButton();

        if (cooldown <= 0) {
          window.clearInterval(timerId);
          runDownload();
        }
      }, 1000);
    });

    setButton();
  </script>
</body>
</html>
